<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metricum Tests</title>
    <style>
      :root {
        --bg: #f4f7f9;
        --card: #ffffff;
        --text: #18212f;
        --muted: #667085;
        --border: #e2e8f0;
        --success: #16a34a;
        --danger: #e11d48;
        --primary: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      main {
        width: min(100% - 32px, 1040px);
        margin: 0 auto;
        padding: 36px 0;
      }

      .hero,
      .summary,
      .test-list {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 12px 34px rgba(24, 33, 47, 0.05);
      }

      .hero {
        display: grid;
        gap: 10px;
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 44px);
        line-height: 1;
      }

      p {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 18px;
      }

      .button {
        min-height: 42px;
        padding: 10px 16px;
        border: 0;
        border-radius: 14px;
        background: var(--primary);
        color: #ffffff;
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }

      .button:hover,
      .button:focus-visible {
        filter: brightness(1.04);
        outline: none;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        margin-top: 18px;
        overflow: hidden;
      }

      .summary-card {
        display: grid;
        gap: 6px;
        padding: 18px;
        background: #f8fafc;
      }

      .summary-card span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .summary-card strong {
        font-size: 30px;
        line-height: 1;
      }

      .test-list {
        display: grid;
        gap: 0;
        margin-top: 18px;
        overflow: hidden;
      }

      .test-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }

      .test-item:last-child {
        border-bottom: 0;
      }

      .test-status {
        display: inline-grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border-radius: 10px;
        color: #ffffff;
        font-size: 13px;
        font-weight: 950;
      }

      .test-item.pass .test-status {
        background: var(--success);
      }

      .test-item.fail .test-status {
        background: var(--danger);
      }

      .test-name {
        font-size: 14px;
        font-weight: 850;
      }

      .test-message {
        margin-top: 4px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
    <script src="../src/normalizers.js" defer></script>
    <script src="../src/periodBuilder.js" defer></script>
    <script src="../src/comparator.js" defer></script>
    <script src="./testRunner.js" defer></script>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Metricum Tests</h1>
        <p>
          Локальный браузерный стенд без npm, Jest и backend. Проверяет чистые модули ядра:
          нормализацию, сбор периодов из одного файла и сравнение данных.
        </p>
        <div class="toolbar">
          <p id="testStatus">Тесты запустятся после загрузки страницы.</p>
          <button id="runTestsButton" class="button" type="button">Запустить тесты</button>
        </div>
      </section>

      <section class="summary" aria-label="Сводка тестов">
        <div class="summary-card">
          <span>Всего</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="summary-card">
          <span>Успешно</span>
          <strong id="passedCount">0</strong>
        </div>
        <div class="summary-card">
          <span>Ошибки</span>
          <strong id="failedCount">0</strong>
        </div>
      </section>

      <section id="testList" class="test-list" aria-live="polite"></section>
    </main>
  </body>
</html>
